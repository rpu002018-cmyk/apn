<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admission Document Acknowledgement</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 1000px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    /* Login Section */
    .login-section {
      background: #f8f9fa;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 30px;
      display: none;
    }

    .login-section.active {
      display: block;
    }

    .login-section h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 18px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: center;
    }

    button {
      padding: 10px 25px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #5a6268;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-success:hover {
      background: #218838;
    }

    /* Main Section */
    .main-section {
      display: none;
    }

    .main-section.active {
      display: block;
    }

    .welcome-bar {
      background: #e7f3ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 30px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .welcome-bar .logout-btn {
      padding: 8px 15px;
      font-size: 12px;
    }

    .mode-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #ddd;
    }

    .mode-tab {
      padding: 12px 20px;
      border: none;
      background: transparent;
      color: #666;
      cursor: pointer;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .mode-tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .mode-content {
      display: none;
    }

    .mode-content.active {
      display: block;
    }

    .document-list {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      max-height: 500px;
      overflow-y: auto;
    }

    .document-list h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .document-item {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      border-left: 4px solid #667eea;
    }

    .document-item.received {
      border-left-color: #28a745;
    }

    .document-item.issued {
      border-left-color: #ffc107;
    }

    .document-info h4 {
      color: #333;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .document-info p {
      color: #666;
      font-size: 12px;
      margin-bottom: 3px;
    }

    .checkbox-group {
      display: flex;
      gap: 20px;
      align-items: center;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
      font-weight: normal;
      cursor: pointer;
      font-size: 13px;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
      margin: 0;
      cursor: pointer;
    }

    .dropdown-inline {
      display: inline-block;
      margin-left: 10px;
    }

    .dropdown-inline select {
      padding: 6px 10px;
      font-size: 12px;
      border: 1px solid #ddd;
      border-radius: 3px;
      background-color: white;
    }

    .alert {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border-left: 4px solid #28a745;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border-left: 4px solid #f5c6cb;
    }

    .alert-info {
      background: #d1ecf1;
      color: #0c5460;
      border-left: 4px solid #bee5eb;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-submitted {
      background: #d4edda;
      color: #155724;
    }

    .status-pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-issued {
      background: #d1ecf1;
      color: #0c5460;
    }

    .issued-doc-container {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      border-left: 4px solid #ffc107;
    }

    .issued-doc-row {
      display: grid;
      grid-template-columns: 1fr 100px 150px;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .issued-doc-row input {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 13px;
    }

    .issued-doc-row button {
      padding: 6px 12px;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .button-group {
        flex-direction: column;
      }

      .mode-tabs {
        flex-direction: column;
      }

      .welcome-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .document-list {
        max-height: 300px;
      }

      .checkbox-group {
        flex-direction: column;
        align-items: flex-start;
      }

      .issued-doc-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 Admission Document Acknowledgement</h1>
      <p>REVA Independent PU College</p>
    </div>

    <!-- LOGIN SECTION -->
    <div class="login-section active" id="loginSection">
      <h2>Operator Login</h2>
      <div class="form-group">
        <label for="operatorId">Operator ID</label>
        <input type="text" id="operatorId" placeholder="Enter your operator ID">
      </div>
      <div class="form-group">
        <label for="operatorPassword">Password</label>
        <input type="password" id="operatorPassword" placeholder="Enter your password">
      </div>
      <div class="button-group">
        <button class="btn-primary" onclick="handleLogin()">Login</button>
      </div>
      <div id="loginAlert"></div>
    </div>

    <!-- MAIN SECTION -->
    <div class="main-section" id="mainSection">
      <div class="welcome-bar">
        <div>
          <strong>Welcome, <span id="operatorName"></span>!</strong>
        </div>
        <button class="btn-secondary logout-btn" onclick="handleLogout()">Logout</button>
      </div>

      <!-- MODE TABS -->
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="switchMode('received')">📥 Document Received</button>
        <button class="mode-tab" onclick="switchMode('issued')">📤 Document Issued</button>
      </div>

      <!-- RECEIVED MODE -->
      <div class="mode-content active" id="receivedMode">
        <h2 style="margin-bottom: 20px; color: #333;">Document Received Mode</h2>

        <div class="form-group">
          <label for="searchStudentReceived">Search Student (Register No / Application No)</label>
          <input type="text" id="searchStudentReceived" placeholder="Enter Register No or Application No" onkeyup="searchStudentReceived()">
        </div>

        <div id="studentDetailsReceived" class="hidden">
          <div class="form-row">
            <div class="form-group">
              <label>Application No</label>
              <input type="text" id="appNoReceived" readonly>
            </div>
            <div class="form-group">
              <label>Student Name</label>
              <input type="text" id="studentNameReceived" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Section</label>
              <input type="text" id="sectionReceived" readonly>
            </div>
            <div class="form-group">
              <label>Sub-Section</label>
              <input type="text" id="subSectionReceived" readonly>
            </div>
          </div>

          <div class="document-list" id="documentListReceived">
            <h3>Documents to Receive</h3>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" id="sendEmailReceived">
              Send Acknowledgement Email
            </label>
          </div>

          <div class="button-group">
            <button class="btn-success" onclick="saveDocumentsReceived()">Save Documents</button>
            <button class="btn-secondary" onclick="clearFormReceived()">Clear</button>
          </div>

          <div id="alertReceived"></div>
        </div>
      </div>

      <!-- ISSUED MODE -->
      <div class="mode-content" id="issuedMode">
        <h2 style="margin-bottom: 20px; color: #333;">Document Issued Mode</h2>

        <div class="form-group">
          <label for="searchStudentIssued">Search Student (Register No / Application No)</label>
          <input type="text" id="searchStudentIssued" placeholder="Enter Register No or Application No" onkeyup="searchStudentIssued()">
        </div>

        <div id="studentDetailsIssued" class="hidden">
          <div class="form-row">
            <div class="form-group">
              <label>Application No</label>
              <input type="text" id="appNoIssued" readonly>
            </div>
            <div class="form-group">
              <label>Student Name</label>
              <input type="text" id="studentNameIssued" readonly>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Section</label>
              <input type="text" id="sectionIssued" readonly>
            </div>
            <div class="form-group">
              <label>Sub-Section</label>
              <input type="text" id="subSectionIssued" readonly>
            </div>
          </div>

          <div class="document-list" id="documentListIssued">
            <h3>Add Documents to Issue</h3>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" id="sendEmailIssued">
              Send Acknowledgement Email
            </label>
          </div>

          <div class="button-group">
            <button class="btn-success" onclick="saveDocumentsIssued()">Save Documents</button>
            <button class="btn-secondary" onclick="clearFormIssued()">Clear</button>
          </div>

          <div id="alertIssued"></div>
        </div>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Processing...</p>
    </div>
  </div>

  <script>
    const PERSON_OPTIONS = ["Student", "Mother", "Father", "Sister", "Brother", "Guardian"];

    let currentOperator = null;
    let receivedDocumentsList = [];
    let issuedDocumentsList = [];
    let selectedDocuments = {};
    let issuedDocuments = [];

    // LOAD DOCUMENT LISTS
    function loadDocumentLists() {
      showLoading(true);
      google.script.run.withSuccessHandler(function(received) {
        google.script.run.withSuccessHandler(function(issued) {
          showLoading(false);
          receivedDocumentsList = received;
          issuedDocumentsList = issued;
        }).getIssuedDocumentsList();
      }).getReceivedDocumentsList();
    }

    // LOGIN FUNCTIONALITY
    function handleLogin() {
      const id = document.getElementById('operatorId').value.trim();
      const pwd = document.getElementById('operatorPassword').value.trim();

      if (!id || !pwd) {
        showAlert('loginAlert', 'Please enter both ID and password', 'error');
        return;
      }

      showLoading(true);

      google.script.run.withSuccessHandler(function(result) {
        showLoading(false);
        if (result.success) {
          currentOperator = { id, name: result.name };
          document.getElementById('operatorName').textContent = result.name;
          document.getElementById('loginSection').classList.remove('active');
          document.getElementById('mainSection').classList.add('active');
          document.getElementById('operatorPassword').value = '';
          loadDocumentLists();
        } else {
          showAlert('loginAlert', 'Invalid credentials', 'error');
        }
      }).withFailureHandler(function(err) {
        showLoading(false);
        showAlert('loginAlert', 'Login failed: ' + err.message, 'error');
      }).validateOperator(id, pwd);
    }

    function handleLogout() {
      currentOperator = null;
      document.getElementById('loginSection').classList.add('active');
      document.getElementById('mainSection').classList.remove('active');
      document.getElementById('operatorId').value = '';
      document.getElementById('operatorPassword').value = '';
      document.getElementById('loginAlert').innerHTML = '';
      clearFormReceived();
      clearFormIssued();
    }

    // MODE SWITCHING
    function switchMode(mode) {
      document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.mode-content').forEach(content => content.classList.remove('active'));

      if (mode === 'received') {
        document.querySelector('.mode-tab:nth-child(1)').classList.add('active');
        document.getElementById('receivedMode').classList.add('active');
      } else {
        document.querySelector('.mode-tab:nth-child(2)').classList.add('active');
        document.getElementById('issuedMode').classList.add('active');
      }
    }

    // RECEIVED MODE FUNCTIONS
    function searchStudentReceived() {
      const value = document.getElementById('searchStudentReceived').value.trim();
      if (!value) {
        document.getElementById('studentDetailsReceived').classList.add('hidden');
        return;
      }

      showLoading(true);
      google.script.run.withSuccessHandler(function(result) {
        showLoading(false);
        if (result) {
          document.getElementById('appNoReceived').value = result.applicationNo;
          document.getElementById('studentNameReceived').value = result.name;
          document.getElementById('sectionReceived').value = result.section || '-';
          document.getElementById('subSectionReceived').value = result.subSection || '-';
          document.getElementById('studentDetailsReceived').classList.remove('hidden');
          loadExistingDocumentsReceived(result.applicationNo);
        } else {
          document.getElementById('studentDetailsReceived').classList.add('hidden');
          showAlert('alertReceived', 'Student not found', 'error');
        }
      }).withFailureHandler(function(err) {
        showLoading(false);
        showAlert('alertReceived', 'Error: ' + err.message, 'error');
      }).searchStudent(value);
    }

    function loadExistingDocumentsReceived(appNo) {
      showLoading(true);
      google.script.run.withSuccessHandler(function(existingDocs) {
        showLoading(false);
        const listDiv = document.getElementById('documentListReceived');
        let html = '<h3>Documents to Receive</h3>';
        
        selectedDocuments = {};
        existingDocs.forEach(doc => {
          selectedDocuments[doc.name] = {
            original: doc.original,
            xerox: doc.xerox,
            submittedBy: doc.submittedBy,
            receivedBy: doc.receivedBy
          };
        });

        receivedDocumentsList.forEach((docName) => {
          const existing = existingDocs.find(d => d.name === docName) || {};
          const docHtml = `
            <div class="document-item received">
              <div class="document-info">
                <h4>${docName}</h4>
                ${existing.status ? '<p>Status: <span class="status-badge status-' + existing.status.toLowerCase() + '">' + existing.status + '</span></p>' : ''}
                ${existing.submittedDate ? '<p>Submitted: ' + existing.submittedDate + '</p>' : ''}
                ${existing.receivedBy ? '<p>Received by: ' + existing.receivedBy + '</p>' : ''}
              </div>
              <div style="margin-top: 10px;">
                <div class="checkbox-group">
                  <label>Original <input type="checkbox" class="docOriginal" data-doc="${docName}" ${existing.original ? 'checked' : ''} onchange="updateSelection('${docName}', 'original', this.checked)"></label>
                  <label>Xerox <input type="checkbox" class="docXerox" data-doc="${docName}" ${existing.xerox ? 'checked' : ''} onchange="updateSelection('${docName}', 'xerox', this.checked)"></label>
                </div>
                <div class="checkbox-group">
                  <label>Submitted By:
                    <span class="dropdown-inline">
                      <select class="docSubmittedBy" data-doc="${docName}" onchange="updateSelection('${docName}', 'submittedBy', this.value)">
                        <option value="">-- Select --</option>
                        ${PERSON_OPTIONS.map(p => `<option value="${p}" ${existing.submittedBy === p ? 'selected' : ''}>${p}</option>`).join('')}
                      </select>
                    </span>
                  </label>
                </div>
                <div class="checkbox-group">
                  <label>Received By:
                    <span class="dropdown-inline">
                      <select class="docReceivedBy" data-doc="${docName}" onchange="updateSelection('${docName}', 'receivedBy', this.value)">
                        <option value="">-- Select --</option>
                        ${PERSON_OPTIONS.map(p => `<option value="${p}" ${existing.receivedBy === p ? 'selected' : ''}>${p}</option>`).join('')}
                      </select>
                    </span>
                  </label>
                </div>
              </div>
            </div>
          `;
          html += docHtml;
        });

        listDiv.innerHTML = html;
      }).withFailureHandler(function(err) {
        showLoading(false);
        showAlert('alertReceived', 'Error loading documents: ' + err.message, 'error');
      }).loadExistingDocuments(appNo);
    }

    function updateSelection(docName, type, value) {
      if (!selectedDocuments[docName]) {
        selectedDocuments[docName] = { original: false, xerox: false, submittedBy: '', receivedBy: '' };
      }
      selectedDocuments[docName][type] = value;
    }

    function saveDocumentsReceived() {
      const appNo = document.getElementById('appNoReceived').value;
      const studentName = document.getElementById('studentNameReceived').value;
      const section = document.getElementById('sectionReceived').value;
      const subSection = document.getElementById('subSectionReceived').value;
      const sendEmail = document.getElementById('sendEmailReceived').checked;

      const documents = [];
      for (const [name, flags] of Object.entries(selectedDocuments)) {
        if (flags.original || flags.xerox) {
          documents.push({
            name,
            original: flags.original,
            xerox: flags.xerox,
            submittedBy: flags.submittedBy || '',
            receivedBy: flags.receivedBy || ''
          });
        }
      }

      if (documents.length === 0) {
        showAlert('alertReceived', 'Please select at least one document', 'error');
        return;
      }

      const payload = {
        applicationNo: appNo,
        studentName: studentName,
        section: section,
        subSection: subSection,
        operatorName: currentOperator.name,
        operatorId: currentOperator.id,
        email: sendEmail ? 'send' : '',
        documents: documents
      };

      showLoading(true);
      google.script.run.withSuccessHandler(function(result) {
        showLoading(false);
        if (result.success) {
          showAlert('alertReceived', 'Documents saved successfully!', 'success');
          clearFormReceived();
        } else {
          showAlert('alertReceived', 'Error: ' + result.error, 'error');
        }
      }).withFailureHandler(function(err) {
        showLoading(false);
        showAlert('alertReceived', 'Error: ' + err.message, 'error');
      }).saveDocuments(payload);
    }

    function clearFormReceived() {
      document.getElementById('searchStudentReceived').value = '';
      document.getElementById('studentDetailsReceived').classList.add('hidden');
      document.getElementById('sendEmailReceived').checked = false;
      document.getElementById('alertReceived').innerHTML = '';
      selectedDocuments = {};
    }

    // ISSUED MODE FUNCTIONS
    function searchStudentIssued() {
      const value = document.getElementById('searchStudentIssued').value.trim();
      if (!value) {
        document.getElementById('studentDetailsIssued').classList.add('hidden');
        return;
      }

      showLoading(true);
      google.script.run.withSuccessHandler(function(result) {
        showLoading(false);
        if (result) {
          document.getElementById('appNoIssued').value = result.applicationNo;
          document.getElementById('studentNameIssued').value = result.name;
          document.getElementById('sectionIssued').value = result.section || '-';
          document.getElementById('subSectionIssued').value = result.subSection || '-';
          document.getElementById('studentDetailsIssued').classList.remove('hidden');
          issuedDocuments = [];
          addDocumentIssued();
        } else {
          document.getElementById('studentDetailsIssued').classList.add('hidden');
          showAlert('alertIssued', 'Student not found', 'error');
        }
      }).withFailureHandler(function(err) {
        showLoading(false);
        showAlert('alertIssued', 'Error: ' + err.message, 'error');
      }).searchStudent(value);
    }

    function addDocumentIssued() {
      issuedDocuments.push({ name: '', quantity: 1, receivedBy: '' });
      renderIssuedDocuments();
    }

    function renderIssuedDocuments() {
      const listDiv = document.getElementById('documentListIssued');
      let html = '<h3>Add Documents to Issue</h3><div style="margin-bottom: 15px;"><button class="btn-primary" onclick="addDocumentIssued()" style="width: 100%;">+ Add Document</button></div>';

      issuedDocuments.forEach((doc, index) => {
        html += `
          <div class="issued-doc-container">
            <div class="issued-doc-row">
              <input type="text" placeholder="Select or type document name" value="${doc.name}" list="issuedDocList" onchange="updateIssuedDoc(${index}, 'name', this.value)">
              <input type="number" min="1" value="${doc.quantity}" placeholder="Qty" onchange="updateIssuedDoc(${index}, 'quantity', parseInt(this.value))">
              <button class="btn-danger" onclick="removeIssuedDoc(${index})">Remove</button>
            </div>
            <div style="margin-top: 10px;">
              <label>Received By:
                <select class="docReceivedByIssued" data-index="${index}" onchange="updateIssuedDoc(${index}, 'receivedBy', this.value)">
                  <option value="">-- Select --</option>
                  ${PERSON_OPTIONS.map(p => `<option value="${p}" ${doc.receivedBy === p ? 'selected' : ''}>${p}</option>`).join('')}
                </select>
              </label>
            </div>
          </div>
        `;
      });

      html += `
        <datalist id="issuedDocList">
          ${issuedDocumentsList.map(d => `<option value="${d}">`).join('')}
        </datalist>
      `;

      listDiv.innerHTML = html;
    }

    function updateIssuedDoc(index, field, value) {
      if (issuedDocuments[index]) {
        issuedDocuments[index][field] = value;
      }
    }

    function removeIssuedDoc(index) {
      issuedDocuments.splice(index, 1);
      renderIssuedDocuments();
    }

    function saveDocumentsIssued() {
      const appNo = document.getElementById('appNoIssued').value;
      const studentName = document.getElementById('studentNameIssued').value;
      const section = document.getElementById('sectionIssued').value;
      const subSection = document.getElementById('subSectionIssued').value;
      const sendEmail = document.getElementById('sendEmailIssued').checked;

      const documents = issuedDocuments.filter(doc => doc.name.trim() !== '');

      if (documents.length === 0) {
        showAlert('alertIssued', 'Please add at least one document', 'error');
        return;
      }

      const payload = {
        applicationNo: appNo,
        studentName: studentName,
        section: section,
        subSection: subSection,
        operatorName: currentOperator.name,
        operatorId: currentOperator.id,
        email: sendEmail ? 'send' : '',
        documents: documents
      };

      showLoading(true);
      google.script.run.withSuccessHandler(function(result) {
        showLoading(false);
        if (result.success) {
          showAlert('alertIssued', 'Documents saved successfully!', 'success');
          clearFormIssued();
        } else {
          showAlert('alertIssued', 'Error: ' + result.error, 'error');
        }
      }).withFailureHandler(function(err) {
        showLoading(false);
        showAlert('alertIssued', 'Error: ' + err.message, 'error');
      }).saveIssuedDocuments(payload);
    }

    function clearFormIssued() {
      document.getElementById('searchStudentIssued').value = '';
      document.getElementById('studentDetailsIssued').classList.add('hidden');
      document.getElementById('sendEmailIssued').checked = false;
      document.getElementById('alertIssued').innerHTML = '';
      issuedDocuments = [];
    }

    // UTILITY FUNCTIONS
    function showAlert(elementId, message, type) {
      const alertDiv = document.getElementById(elementId);
      alertDiv.innerHTML = '<div class="alert alert-' + type + '">' + message + '</div>';
      setTimeout(() => {
        alertDiv.innerHTML = '';
      }, 5000);
    }

    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
    }
  </script>
</body>
</html>
